name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          # Go 1.24+ emits LC_UUID for internally linked Mach-O binaries,
          # including Darwin binaries cross-compiled on Linux.
          go-version: 1.24.x
          cache-dependency-path: go.sum
      - name: Install locked protobuf tools
        run: go run ./cmd/jgo tools install
      - name: Run complete release gate
        run: make ci
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="jgo_${VERSION}_${os}_${arch}"
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/eyesofblue/jgo/internal/command.Version=${VERSION}" \
              -o "dist/${name}/jgo" ./cmd/jgo
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
