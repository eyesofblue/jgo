name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local
  GOWORK: off

jobs:
  quality:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go: 1.24.x
          - os: macos-latest
            go: 1.24.x
          - os: ubuntu-latest
            go: 1.25.x
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Build CLI
        run: go build -trimpath -o "${{ runner.temp }}/jgo" ./cmd/jgo

  generation:
    name: Real generation consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache-dependency-path: go.sum
      - name: Install locked protobuf tools
        run: go run ./cmd/jgo tools install
      - name: Verify real generated project is idempotent
        run: ./scripts/verify-generation.sh
