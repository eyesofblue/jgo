name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Go 1.22 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # Go 1.22's internal Mach-O linker predates LC_UUID generation. Current
      # macOS runners require it, so use Apple's external linker on macOS.
      GOFLAGS: ${{ matrix.goflags }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goflags: ""
          - os: macos-latest
            goflags: "-ldflags=-linkmode=external"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.22.x
          cache-dependency-path: go.sum
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Build CLI
        run: go build -trimpath -o "${{ runner.temp }}/jgo" ./cmd/jgo

  generation:
    name: Real generation consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.22.x
          cache-dependency-path: go.sum
      - name: Install locked protobuf tools
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.46.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.7
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Verify real generated project is idempotent
        run: ./scripts/verify-generation.sh
